name: quran_app
description: A new Flutter project.

version: 1.6.0

environment:
  sdk: '>=2.17.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2
  carousel_slider: ^4.1.1
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Network & API
  http: ^0.13.4
  dio: ^5.4.0
  
  # Data & Storage
  shared_preferences: ^2.0.15
  dartz: ^0.10.1
  
  # Audio
  just_audio: ^0.9.28
  audio_service: ^0.18.12
  audio_session: ^0.1.18
  
  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  freezed: ^2.4.5
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
