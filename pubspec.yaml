name: quran_app
description: A new Flutter project.

version: 1.6.0

environment:
  sdk: ">=2.17.6 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.2
  http: ^1.2.2
  intl: ^0.18.1
  just_audio: ^0.10.5
  shared_preferences: ^2.5.4
  audio_service: ^0.18.18
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
